  el:'#map',
  direction:MindElixir.SIDE,
  draggable: !isEmbed,
  contextMenu:false,
  toolBar:false,
  nodeMenu:false,
  keypress:false,
  before:{ beginEdit(){ return false; } }
});
me.init(DATA);

const mapEl = document.getElementById('map');

// Bounding box (screen coords) of all rendered nodes
function nodesBBox(){
  const topics = mapEl.querySelectorAll('me-tpc');
  if (!topics.length) return null;
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  topics.forEach(t=>{
    const r = t.getBoundingClientRect();
    minX=Math.min(minX,r.left);  minY=Math.min(minY,r.top);
    maxX=Math.max(maxX,r.right);  maxY=Math.max(maxY,r.bottom);
  });
  return {minX,minY,maxX,maxY,w:maxX-minX,h:maxY-minY,cx:(minX+maxX)/2,cy:(minY+maxY)/2};
}

// Find the element mind-elixir applies its pan/zoom transform to
function transformedEl(){
  const kids = mapEl.querySelectorAll('*');
  for (const el of kids){
    const t = getComputedStyle(el).transform;
    if (t && t.indexOf('matrix') === 0) return el;
  }
  return null;
}

// Scale the map to fit the viewport, then center the CONTENT (not just the root)
function fitMap(){
  try {
    me.scale(1);
    const nat = nodesBBox();
    if (!nat || nat.w<=0 || nat.h<=0) return;
    const cw = mapEl.clientWidth, ch = mapEl.clientHeight;
    const scale = Math.min(cw/nat.w, ch/nat.h) * 0.9;
    me.scale(scale);
    me.toCenter();

    // Content-center: nudge the transform so the node bbox sits dead-centre
    const el = transformedEl();
    const box = nodesBBox();
    if (el && box){
      const m = new DOMMatrixReadOnly(getComputedStyle(el).transform);
      const mapRect = mapEl.getBoundingClientRect();
      const dx = (mapRect.left + cw/2) - box.cx;
      const dy = (mapRect.top + ch/2) - box.cy;
      el.style.transform = `matrix(${m.a},${m.b},${m.c},${m.d},${m.e+dx},${m.f+dy})`;
    }
  } catch(e){}
}

if (isEmbed) {
  // Hide floating UI not needed in embed
  document.querySelectorAll('.map-title').forEach(el=>el.style.display='none');

  // Kill drag-to-pan: block pointer/mouse/touch down on background (capture phase,
  // so mind-elixir never receives it). Node clicks still pass through.
  ['pointerdown','mousedown','touchstart'].forEach(evt=>{
    window.addEventListener(evt, function(e){
      if (!e.target.closest('me-tpc') && !e.target.closest('a[href]')) {
        e.preventDefault(); e.stopPropagation();
      }
    }, {capture:true, passive:false});
  });

  // Kill scroll-zoom: intercept wheel in capture phase before mind-elixir,
  // and forward the scroll to the parent page so it can still scroll.
  window.addEventListener('wheel', function(e){
    e.preventDefault(); e.stopPropagation();
    try { window.parent.postMessage({type:'wheel', deltaX:e.deltaX, deltaY:e.deltaY}, '*'); } catch(_){}
  }, {capture:true, passive:false});
}

// Both modes: fit the whole map into view on load (full screen keeps drag/zoom)
setTimeout(fitMap, 350);
setTimeout(fitMap, 800);
setTimeout(fitMap, 1400);
window.addEventListener('resize', fitMap);

/* Prevent double-click edit */
document.getElementById('map').addEventListener('dblclick', e=>{
  e.stopImmediatePropagation(); e.preventDefault();
}, true);

/* ── CLICK HANDLER ── */
document.getElementById('map').addEventListener('click', function(e){
  if(document.getElementById('popup-overlay').classList.contains('open')) return;
  const anchor = e.target.closest('a[href]');
  if(anchor){ const h=anchor.getAttribute('href'); if(h&&POPUP_DATA[h]){ e.preventDefault(); e.stopPropagation(); showPopup(POPUP_DATA[h]); return; } }
  const tpc = e.target.closest('me-tpc');
  if(tpc){ const n=tpc.nodeObj; if(n&&n.hyperLink&&POPUP_DATA[n.hyperLink]){ e.preventDefault(); e.stopPropagation(); showPopup(POPUP_DATA[n.hyperLink]); } }
}, true);

/* ── POPUP ── */
function showPopup(d){
  document.getElementById('popup-title').textContent=d.title;
  document.getElementById('popup-subtitle').textContent=d.subtitle;
  const rows=[{lbl:'Nodal Authority',val:d.nodal},{lbl:'Scope',val:d.scope},{lbl:'Trigger',val:d.trigger},{lbl:'Prohibitions & Restrictions',val:d.prohibitions},{lbl:'Action / Remedies',val:d.action}].filter(r=>r.val);
  document.getElementById('popup-struct').innerHTML=rows.map(r=>`<div class="popup-row"><div class="popup-rlbl">${r.lbl}</div><div class="popup-rval">${Array.isArray(r.val)?`<ul>${r.val.map(v=>`<li>${v}</li>`).join('')}</ul>`:r.val}</div></div>`).join('');
  const _srcs=[d.source,d.source2].filter(Boolean);document.getElementById('popup-source').innerHTML=`<span class="popup-source-lbl">Source${_srcs.length>1?'s':''}</span><div style="display:flex;flex-direction:column;gap:3px;">${_srcs.map(s=>`<a href="${s.url}" target="_blank" rel="noopener">${s.name} ↗</a>`).join('')}</div>`;
  document.getElementById('popup-overlay').classList.add('open');
}
function closePopup(){ document.getElementById('popup-overlay').classList.remove('open'); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closePopup(); });
